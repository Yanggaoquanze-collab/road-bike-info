      <stop offset="0%" style="stop-color:#4a7168;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#886aeb;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#12121a" rx="12"/>
