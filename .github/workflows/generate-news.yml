name: Daily News Generation

on:
  schedule:
    # 北京时间每天 10:00 (UTC+8 → 02:00 UTC)
    - cron: "0 2 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-news.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/news/_auto/
          if git diff --cached --quiet; then
            echo "No new news to commit"
          else
            git commit -m "auto: daily news update ($(date +%Y-%m-%d))"
            git push
          fi
